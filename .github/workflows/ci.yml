name: Test and Build

# Trigger the workflow on pushes and pull requests to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Run tests across multiple Python versions to ensure compatibility
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    # 1. Grab your repository's code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up the specific Python version from the matrix
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # Speeds up subsequent runs by caching dependencies

    # 3. Install your library and testing tools
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest build

    # 4. Run the test suite
    - name: Run Pytest
      run: |
        pytest tests/ -v

    # 5. Build the wheel (We only need to do this once, so we tie it to Python 3.10)
    - name: Build distribution
      if: matrix.python-version == '3.10'
      run: |
        python -m build

    # 6. Save the generated wheel so you can download it from GitHub later
    - name: Upload Build Artifacts
      if: matrix.python-version == '3.10'
      uses: actions/upload-artifact@v4
      with:
        name: seriesvault-packages
        path: dist/
